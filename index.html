<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SYSTEM | Dashboard</title>
    <script src="https://telegram.org/js/telegram-widget.js?22"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0b10;
            --card: #161b22;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background Particle Effect */
        #bg-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1c2c 0%, #0a0b10 100%);
            z-index: -1;
        }

        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5em;
            letter-spacing: 5px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00f2ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8em;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
        }

        .info-text {
            color: #8b949e;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        #login-container {
            margin-top: 20px;
            transition: transform 0.3s;
        }

        #login-container:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7em;
            color: #484f58;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="bg-effect"></div>

    <div class="container">
        <div class="status-bar">
            <span class="dot"></span> NEXUS CORE: ONLINE
        </div>
        
        <h1>NEXUS</h1>
        <p class="info-text">Sistem Downloader Berkecepatan Tinggi.<br>Silakan login untuk menghubungkan akun Telegram Anda ke dashboard.</p>

        <div id="login-container">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="fixredadit_bot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>

        <div class="footer">DEVELOPED BY ADIT • 2026</div>
    </div>

    <script type="text/javascript">
      function onTelegramAuth(user) {
        // GANTI ALAMAT IP DAN PORT SESUAI PANEL PTERODACTYL KAMU
        const API_URL = 'http://idneww.raraaprivate.my.id:9516/api/login';

        fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        })
        .then(response => response.json())
        .then(data => {
          alert('Berhasil terhubung ke Core Nexus!');
          console.log('Server Response:', data);
        })
        .catch(error => {
          alert('Gagal terhubung ke Server API. Pastikan Bot sudah menyala!');
          console.error('Error:', error);
        });
      }
    </script>
</body>
  </html>
