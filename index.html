<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS CORE | OS</title>
    <style>
        :root { --primary: #00f2ff; --bg: #050505; --card: rgba(22, 27, 34, 0.8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; backdrop-filter: brightness(0.7); }
        .nexus-box { background: var(--card); border: 1px solid var(--primary); padding: 40px; border-radius: 5px; text-align: center; width: 350px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); position: relative; }
        
        .scanline { width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1); position: absolute; top: 0; left: 0; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        h1 { font-size: 2em; letter-spacing: 10px; color: var(--primary); text-shadow: 0 0 10px var(--primary); margin: 0; }
        .glitch-text { animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        #dashboard { display: none; }
        .user-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; font-size: 0.7em; }
        .stat-item { border: 1px solid rgba(0, 242, 255, 0.3); padding: 5px; }
        
        .btn-logout { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 5px 10px; margin-top: 20px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="scanline"></div>

    <div class="overlay">
        <div class="nexus-box" id="login-screen">
            <h1 class="glitch-text">NEXUS</h1>
            <p style="font-size: 0.7em; color: #888; margin: 20px 0;">[ STATUS: AWAITING_AUTH ]</p>
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="fixredadit_bot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>

        <div class="nexus-box" id="dashboard">
            <img src="" id="user-img" class="user-avatar">
            <div id="user-name" style="font-weight: bold; color: var(--primary);"></div>
            <div id="user-id" style="font-size: 0.7em; opacity: 0.6;"></div>
            
            <div class="stat-grid">
                <div class="stat-item">OS: NEXUS v1.5.1</div>
                <div class="stat-item" id="live-uptime">UP: 0h 0m</div>
                <div class="stat-item">SEC: ENCRYPTED</div>
                <div class="stat-item" id="live-users">USERS: --</div>
            </div>

            <button class="btn-logout" onclick="location.reload()">TERMINATE SESSION</button>
        </div>
    </div>

    <script>
        // CJS: MATRIX PARTICLE ENGINE
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 2;
                this.size = Math.random() * 2;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();

        // CJS: TELEGRAM AUTH LOGIC
        function onTelegramAuth(user) {
            const API_URL = 'http://idneww.raraaprivate.my.id:9516/api'; //

            // Kirim Data Login
            fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            }).catch(e => console.log("Offline bypass enabled."));

            // Ambil Stats Bot
            fetch(`${API_URL}/stats`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('live-users').innerText = 'USERS: ' + data.totalUsers;
                    document.getElementById('live-uptime').innerText = 'UP: ' + data.uptime;
                });

            // Transisi Antar Layer
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            document.getElementById('user-img').src = user.photo_url || 'https://ui-avatars.com/api/?name='+user.first_name;
            document.getElementById('user-name').innerText = '> ' + user.first_name.toUpperCase();
            document.getElementById('user-id').innerText = 'UID: ' + user.id;
        }
    </script>
</body>
</html>
