<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | PRO DASHBOARD</title>
    <style>
        :root { --primary: #00f2ff; --bg: #050505; --card: rgba(22, 27, 34, 0.9); --accent: #0072ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .nexus-main { background: var(--card); border: 1px solid rgba(0, 242, 255, 0.3); width: 90%; max-width: 900px; height: 80vh; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

        /* Sidebar/Header Navigation */
        .nav-bar { display: flex; background: rgba(0,0,0,0.5); padding: 10px 20px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); gap: 20px; }
        .nav-item { cursor: pointer; font-size: 0.8em; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; padding: 10px; }
        .nav-item.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* Content Area */
        .content-body { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .content-body.active { display: block; animation: slideUp 0.5s ease; }

        /* Profile Section */
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .user-avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .gallery-item { background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .gallery-item:hover { transform: translateY(-5px); border-color: var(--primary); }
        .thumb { height: 120px; background: linear-gradient(45deg, #1a1a1a, #333); display: flex; align-items: center; justify-content: center; font-size: 0.7em; color: #555; }

        /* Stats Card */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-val { font-size: 1.5em; font-weight: bold; color: var(--primary); display: block; }
        .stat-lbl { font-size: 0.7em; color: #888; text-transform: uppercase; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="overlay">
        
        <div id="login-screen" class="nexus-main">
            <h1 style="letter-spacing: 15px; color: var(--primary);">NEXUS</h1>
            <p style="opacity: 0.5; margin-bottom: 30px;">[ SYSTEM ENCRYPTED - AUTHORIZATION REQUIRED ]</p>
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="fixredadit_bot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>

        <div id="dashboard" class="nexus-main hidden">
            <div class="nav-bar">
                <div class="nav-item active" onclick="showTab('overview', this)">OVERVIEW</div>
                <div class="nav-item" onclick="showTab('gallery', this)">GALLERY</div>
                <div class="nav-item" onclick="showTab('systems', this)">SYSTEMS</div>
            </div>

            <div id="overview" class="content-body active">
                <div class="profile-header">
                    <img src="" id="user-img" class="user-avatar">
                    <div>
                        <h2 id="user-name" style="margin:0;">ADIT</h2>
                        <span id="user-id" style="color:var(--primary); font-size: 0.8em;"></span>
                    </div>
                </div>
                <div class="stats-container">
                    <div class="stat-card"><span class="stat-val" id="st-users">--</span><span class="stat-lbl">Total Users</span></div>
                    <div class="stat-card"><span class="stat-val" id="st-uptime">--</span><span class="stat-lbl">Uptime</span></div>
                    <div class="stat-card"><span class="stat-val">1.5.1</span><span class="stat-lbl">System Ver</span></div>
                </div>
            </div>

            <div id="gallery" class="content-body">
                <h3 style="color:var(--primary);">MEDIA VAULT</h3>
                <div class="gallery-grid">
                    <div class="gallery-item"><div class="thumb">TIKTOK_MP4</div><div style="padding:10px; font-size:0.6em;">Video #122</div></div>
                    <div class="gallery-item"><div class="thumb">INSTA_REEL</div><div style="padding:10px; font-size:0.6em;">Reel #88</div></div>
                    <div class="gallery-item"><div class="thumb">TIKTOK_MP4</div><div style="padding:10px; font-size:0.6em;">Video #121</div></div>
                </div>
            </div>

            <div id="systems" class="content-body">
                <h3 style="color:var(--primary);">CORE CONTROL</h3>
                <p style="font-size: 0.8em; opacity: 0.6;">Server Address: idneww.raraaprivate.my.id:9516</p>
                <button onclick="location.reload()" style="background:transparent; border:1px solid #ff4444; color:#ff4444; padding:10px 20px; cursor:pointer;">TERMINATE ALL SESSIONS</button>
            </div>
        </div>
    </div>

    <script>
        // Matrix Canvas Logic
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00f2ff';
            for(let i=0; i<30; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();

        function showTab(tabId, el) {
            document.querySelectorAll('.content-body').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        function onTelegramAuth(user) {
            const API_URL = 'http://idneww.raraaprivate.my.id:9516/api';
            
            fetch(`${API_URL}/stats`).then(r => r.json()).then(data => {
                document.getElementById('st-users').innerText = data.totalUsers;
                document.getElementById('st-uptime').innerText = data.uptime;
            }).catch(e => {});

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-img').src = user.photo_url || 'https://ui-avatars.com/api/?name='+user.first_name;
            document.getElementById('user-name').innerText = user.first_name.toUpperCase();
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
        }
    </script>
</body>
</html>
